name: Deploy Production

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to deploy
        required: true
        default: main

concurrency:
  group: production
  cancel-in-progress: false

jobs:
  production:
    name: Production
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://outspeed.me

    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install root dependencies
        run: bun install

      - name: Install webapp dependencies
        run: bun install --cwd apps/webapp

      - name: Install ingestor dependencies
        run: bun install --cwd packages/ingestor

      - name: Generate webapp i18n files
        working-directory: apps/webapp
        run: bunx paraglide-js compile --project ./project.inlang --outdir ./src/lib/paraglide --silent

      - name: Format
        run: bun fmt

      - name: Lint
        run: bun lint

      - name: Typecheck
        run: bun typecheck

      - name: Install Vercel CLI
        run: npm install --global vercel@50.28.0

      - name: Pull Vercel production environment
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy production
        run: vercel deploy --prod --yes --token=${{ secrets.VERCEL_TOKEN }}
