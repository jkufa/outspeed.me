name: Deploy Production

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to deploy
        required: true
        default: main

concurrency:
  group: production
  cancel-in-progress: false

jobs:
  production:
    name: Production
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://outspeed.me

    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install root dependencies
        run: bun install --frozen-lockfile

      - name: Install webapp dependencies
        run: bun --cwd apps/webapp install --frozen-lockfile

      - name: Install ingestor dependencies
        run: bun --cwd packages/ingestor install --frozen-lockfile

      - name: Format
        run: bun fmt

      - name: Lint
        run: bun lint

      - name: Typecheck
        run: bun typecheck

      - name: Install Vercel CLI
        run: bun add --global vercel@50.28.0

      - name: Pull Vercel production environment
        working-directory: apps/webapp
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build production deployment
        working-directory: apps/webapp
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy production
        working-directory: apps/webapp
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
